events {}

http {
  upstream project1_upstream {
    server project1:3001;
  }

  upstream project2_upstream {
    server project2:3002;
  }

  upstream project3_upstream {
    server project3:3003;
  }

  server {
    listen 4545;
    server_name _;

    location = / {
      default_type text/plain;
      return 200 'poc-submodule-main reverse proxy';
    }

    location /project1/ {
      proxy_pass http://project1_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /project2/ {
      proxy_pass http://project2_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /project3/ {
      proxy_pass http://project3_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
